syntax = "proto3";
package network_protocol.items;

import "google/protobuf/empty.proto";

// Frame for network-bound commands, sent from the client backend to the server.
message CommandFrame {
  oneof variant {
    SendMessageFrame send_message = 1;
    string join_channel = 2;
  }
}

message SendMessageFrame {
  string contents = 1;
  
  oneof destination {
    string channel_id = 2;
    string user_id = 3;
  }
}

// Frame for network-bound events, sent from the server to the client backend.
message EventFrame {
  oneof variant {
    ReceiveMessageFrame received_message = 1;
  }
}

// Frame for a chat message.
message ReceiveMessageFrame {
  string contents = 1;
  string sender_id = 2;

  oneof destination {
    google.protobuf.Empty is_direct = 3;
    string channel_id = 4;
  }
}
