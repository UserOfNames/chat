syntax = "proto3";
package network_protocol.items;

import "google/protobuf/empty.proto";

message Uuid {
  bytes value = 1;
}

message ChannelId {
  uint64 id = 1;
}

message UserId {
  Uuid id = 1;
}

message ChannelInfo {
  ChannelId id = 1;
  string name = 2;
}

message UserInfo {
  UserId id = 1;
  string name = 2;
}

// ======================================================
// ====================== COMMANDS ======================
// ======================================================

// Frame for network-bound commands, sent from the client backend to the server.
message CommandFrame {
  oneof variant {
    ClientHello client_hello = 1;
    FetchChannels fetch_channels = 2;
    FetchUsers fetch_users = 3;

    SendMessage send_message = 4;
  }
}

message FetchChannels {
  google.protobuf.Empty empty = 1;
}

message FetchUsers {
  google.protobuf.Empty empty = 1;
}

// Request to send a message to a channel or other users.
message SendMessage {
  string contents = 1;
  
  oneof destination {
    ChannelId channel_id = 2;
    UserId user_id = 3;
  }
}

// Request to connect to the server.
message ClientHello {
  string requested_name = 1;
}

// ======================================================
// ======================= EVENTS =======================
// ======================================================

// Frame for network-bound events, sent from the server to the client backend.
message EventFrame {
  oneof variant {
    ServerHello server_hello = 1;

    ChannelSync channel_sync = 2;
    UserSync user_sync = 3;

    UserInfo user_joined = 4;
    UserId user_left = 5;

    // RESERVED: User changed name, channel added, channel removed, channel changed name

    ReceivedMessage received_message = 9;
  }
}

// Client-bound chat message.
message ReceivedMessage {
  string contents = 1;
  UserId sender_id = 2;

  oneof destination {
    UserId user_id = 3;
    ChannelId channel_id = 4;
  }
}

// A user changed their display name.
message UserChangedName {
  UserInfo new_user_info = 1;
}

// Initial message to give the client session info and state.
message ServerHello {
  UserId your_id = 1;
  optional ChannelId default_channel_id = 2;
}

// Message to sync information about channels on the server.
message ChannelSync {
  repeated ChannelInfo channels = 1;
}

// Message to sync information about users on the server.
message UserSync {
  repeated UserInfo users = 1;
}
